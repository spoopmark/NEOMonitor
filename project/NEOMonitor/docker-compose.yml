
services:
  # --- The Front Door ---
  api-gateway:
    build: ./api-gateway
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
      # Internal Service Discovery URLs
      - ASTEROID_SERVICE_URL=http://asteroid-service:5001
      - USER_SERVICE_URL=http://user-service:5002
      - RISK_SERVICE_URL=http://risk-service:5003
    depends_on:
      redis:
        condition: service_healthy
      asteroid-service:
        condition: service_started
      user-service:
        condition: service_started
      risk-service:
        condition: service_started
    networks:
      - neomonitor

  # --- The Data Fetcher ---
  asteroid-service:
    build: ./asteroid-service
    environment:
      # Pulls key securely from your .env file
      - NASA_API_KEY=${NASA_API_KEY}
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - neomonitor

  # --- The User Manager ---
  user-service:
    build: ./user-watchlist-service
    environment:
      # Connects to the 'db' service defined below
      - DATABASE_URL=postgresql://user:password@db:5432/neomonitor
    depends_on:
      db:
        condition: service_healthy
    networks:
      - neomonitor

  # --- The Brain ---
  risk-service:
    build: ./risk-analysis-service
    environment:
      - ASTEROID_SERVICE_URL=http://asteroid-service:5001
      - USER_SERVICE_URL=http://user-service:5002
    depends_on:
      - asteroid-service
      - user-service
    networks:
      - neomonitor

  # --- The Infrastructure ---
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - neomonitor
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d neomonitor"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    networks:
      - neomonitor
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

# Persistent storage for the database
volumes:
  db_data:

# Internal network for container-to-container communication
networks:
  neomonitor:
    driver: bridge